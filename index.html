<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FIFA World Cup Replays</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0f1a; --surface: #111827; --surface2: #1c2537;
  --border: #1e2d45; --accent: #3b82f6; --accent2: #f59e0b;
  --text: #e5eaf5; --muted: #6b7fa3;
}
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

/* ── MINIMAL HEADER ── */
header {
  padding: 1.1rem 2rem;
  display: flex; align-items: center; gap: 1rem;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}
.header-logo { font-size: 1.1rem; opacity: .7; }
.header-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.35rem; letter-spacing: .08em; color: #fff;
}
.header-title span { color: var(--accent2); }
.header-count {
  margin-left: auto; font-size: .75rem; color: var(--muted); font-weight: 400;
}

/* ── FILTERS ── */
.filters-wrap {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  position: sticky; top: 0; z-index: 100;
}

.filter-section {
  max-width: 1100px; margin: 0 auto;
  padding: .75rem 0;
  border-bottom: 1px solid rgba(30,45,69,.5);
  display: flex; align-items: center; gap: .75rem;
}
.filter-section:last-child { border-bottom: none; }

.filter-label {
  font-size: .65rem; letter-spacing: .13em; text-transform: uppercase;
  color: var(--muted); font-weight: 600; white-space: nowrap; min-width: 3.5rem;
}

.pill-track {
  display: flex; gap: .45rem; flex-wrap: nowrap;
  overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none;
  padding-bottom: 2px;
}
.pill-track::-webkit-scrollbar { display: none; }

.pill {
  flex-shrink: 0;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--muted); font-family: 'DM Sans', sans-serif;
  font-size: .8rem; font-weight: 500; letter-spacing: .02em;
  padding: .32rem .8rem; border-radius: 100px;
  cursor: pointer; transition: all .18s; white-space: nowrap;
  user-select: none;
}
.pill:hover { border-color: rgba(59,130,246,.4); color: var(--text); }
.pill.active {
  background: #fff; border-color: #fff; color: #000;
  font-weight: 600;
}
.pill.active.team { background: var(--accent); border-color: var(--accent); color: #fff; }

.btn-reset-pill {
  flex-shrink: 0; background: transparent; border: 1px solid var(--border);
  color: var(--muted); font-family: 'DM Sans', sans-serif;
  font-size: .75rem; padding: .3rem .7rem; border-radius: 100px;
  cursor: pointer; transition: all .18s; margin-left: auto;
}
.btn-reset-pill:hover { border-color: var(--accent); color: var(--accent); }

.team-row-actions { display: flex; align-items: center; gap: .5rem; margin-left: auto; flex-shrink: 0; }

.btn-team-dropdown {
  flex-shrink: 0; background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: .8rem; font-weight: 500; padding: .32rem .75rem .32rem .9rem;
  border-radius: 100px; cursor: pointer; transition: all .18s;
  display: flex; align-items: center; gap: .4rem; white-space: nowrap;
}
.btn-team-dropdown svg { width: 10px; height: 10px; transition: transform .2s; flex-shrink: 0; }
.btn-team-dropdown.open { border-color: var(--accent); color: var(--accent); }
.btn-team-dropdown.open svg { transform: rotate(180deg); }
.btn-team-dropdown:hover { border-color: rgba(59,130,246,.5); color: var(--text); }

.team-dropdown-panel {
  position: absolute; top: calc(100% + 6px); right: 0;
  background: #141f33; border: 1px solid var(--border);
  border-radius: 10px; padding: .5rem; min-width: 200px; max-height: 320px;
  overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  box-shadow: 0 12px 40px rgba(0,0,0,.6); z-index: 200;
  display: none; flex-direction: column; gap: 1px;
}
.team-dropdown-panel.open { display: flex; }
.team-dropdown-panel::-webkit-scrollbar { width: 4px; }
.team-dropdown-panel::-webkit-scrollbar-track { background: transparent; }
.team-dropdown-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.dropdown-item {
  background: transparent; border: none; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: .85rem;
  padding: .48rem .75rem; border-radius: 6px; cursor: pointer;
  text-align: left; transition: background .15s; white-space: nowrap;
}
.dropdown-item:hover { background: var(--surface2); }
.dropdown-item.active { background: rgba(59,130,246,.15); color: var(--accent); font-weight: 600; }

.dropdown-wrapper { position: relative; }

/* ── VIDEO TYPES ── */
.vtype-section {
  max-width: 1100px; margin: 0 auto;
  padding: .75rem 0;
  display: flex; align-items: center; gap: .75rem; flex-wrap: wrap;
}

.vtype-label {
  font-size: .65rem; letter-spacing: .13em; text-transform: uppercase;
  color: var(--muted); font-weight: 600; white-space: nowrap; min-width: 3.5rem;
}

.vtype-list { display: flex; gap: .5rem; flex-wrap: wrap; }

.vtype-item {
  display: flex; align-items: center; gap: .55rem;
  cursor: pointer; user-select: none;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: .42rem .85rem;
  transition: all .18s;
}
.vtype-item:hover { border-color: rgba(59,130,246,.35); }
.vtype-item.checked { border-color: var(--accent); background: rgba(59,130,246,.08); }

.vtype-check {
  width: 17px; height: 17px; border-radius: 4px; flex-shrink: 0;
  border: 2px solid var(--border); background: transparent;
  display: flex; align-items: center; justify-content: center;
  transition: all .18s;
}
.vtype-item.checked .vtype-check { background: var(--accent); border-color: var(--accent); }
.vtype-check svg { width: 10px; height: 10px; display: none; }
.vtype-item.checked .vtype-check svg { display: block; }

.vtype-text { font-size: .82rem; font-weight: 500; color: var(--muted); white-space: nowrap; }
.vtype-item.checked .vtype-text { color: var(--text); }
.vtype-count { font-size: .75rem; color: var(--muted); }

/* ── MAIN ── */
main { max-width: 1100px; margin: 0 auto; padding: 1.5rem 2rem 4rem; }
.results-meta {
  font-size: .8rem; color: var(--muted); margin-bottom: 1.25rem;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: .5rem;
}
.results-meta strong { color: var(--text); }
.results-meta a { color: var(--accent); text-decoration: none; }
.results-meta a:hover { text-decoration: underline; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.15rem; }

.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  overflow: hidden; display: flex; flex-direction: column;
  transition: transform .2s, border-color .2s, box-shadow .2s;
}
.card:hover { transform: translateY(-3px); border-color: rgba(59,130,246,.4); box-shadow: 0 8px 32px rgba(0,0,0,.45); }

.card-thumb {
  aspect-ratio: 16/9; position: relative; overflow: hidden;
  background: linear-gradient(135deg, #0c1828 0%, #162240 100%);
  display: flex; align-items: center; justify-content: center;
}
.card-thumb::after {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse 70% 55% at 50% 50%, rgba(59,130,246,.06) 0%, transparent 70%),
    repeating-linear-gradient(90deg, transparent, transparent 49%, rgba(255,255,255,.025) 49%, rgba(255,255,255,.025) 51%);
}
.flags { display: flex; align-items: center; position: relative; z-index: 1; filter: drop-shadow(0 2px 14px rgba(0,0,0,.7)); }
.flag { width: 74px; height: 50px; border-radius: 5px; overflow: hidden; border: 2px solid rgba(255,255,255,.2); flex-shrink: 0; display: flex; align-items: stretch; }
.flag svg { width: 100%; height: 100%; display: block; }
.vs-badge { background: rgba(0,0,0,.75); border: 1px solid rgba(255,255,255,.18); color: #fff; font-family: 'Bebas Neue', sans-serif; font-size: .95rem; letter-spacing: .08em; padding: .2rem .55rem; border-radius: 4px; margin: 0 8px; flex-shrink: 0; }
.year-badge { position: absolute; top: .7rem; right: .7rem; z-index: 2; background: var(--accent2); color: #000; font-family: 'Bebas Neue', sans-serif; font-size: .85rem; letter-spacing: .05em; padding: .12rem .5rem; border-radius: 4px; }
.stage-badge { position: absolute; top: .7rem; left: .7rem; z-index: 2; background: rgba(59,130,246,.2); border: 1px solid rgba(59,130,246,.4); color: #93c5fd; font-size: .65rem; letter-spacing: .08em; text-transform: uppercase; padding: .12rem .45rem; border-radius: 4px; font-weight: 500; }

.card-body { padding: 1rem 1.1rem .8rem; flex: 1; display: flex; flex-direction: column; gap: .45rem; }
.match-title { font-size: 1rem; font-weight: 600; color: #fff; line-height: 1.3; }
.match-meta { font-size: .78rem; color: var(--muted); }
.note { font-size: .78rem; color: var(--muted); font-style: italic; line-height: 1.4; }
.score-badge { display: inline-block; background: var(--surface2); border: 1px solid var(--border); font-family: 'Bebas Neue', sans-serif; font-size: .95rem; letter-spacing: .06em; padding: .1rem .55rem; border-radius: 4px; color: var(--accent2); margin-top: auto; align-self: flex-start; }

.card-footer { padding: 0 1.1rem 1rem; }
.watch-link { display: flex; align-items: center; justify-content: center; gap: .5rem; background: var(--accent); color: #fff; text-decoration: none; padding: .62rem 1rem; border-radius: 7px; font-size: .875rem; font-weight: 500; transition: background .2s; width: 100%; }
.watch-link:hover { background: #2563eb; }
.watch-link svg { width: 14px; height: 14px; flex-shrink: 0; }

.state-box { grid-column: 1/-1; text-align: center; padding: 4rem 2rem; color: var(--muted); display: flex; flex-direction: column; align-items: center; gap: 1rem; }
.state-icon { font-size: 2.8rem; opacity: .5; }
.state-box h3 { font-size: 1.1rem; font-weight: 500; color: var(--text); }
.state-box p { font-size: .85rem; max-width: 360px; line-height: 1.6; }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

footer { text-align: center; padding: 1.5rem; font-size: .75rem; color: var(--muted); border-top: 1px solid var(--border); }
footer a { color: var(--accent); text-decoration: none; }
footer a:hover { text-decoration: underline; }

@media (max-width: 680px) {
  header { padding: .85rem 1rem; }
  .filters-wrap { padding: 0 1rem; }
  main { padding: 1.2rem 1rem 3rem; }
}
</style>
</head>
<body>

<header>
  <span class="header-logo">⚽</span>
  <div class="header-title">World Cup <span>Replays</span></div>
  <div class="header-count" id="hdr-count"></div>
</header>

<div class="filters-wrap">
  <div class="filter-section">
    <span class="filter-label">Year</span>
    <div class="pill-track" id="year-pills"></div>
  </div>
  <div class="filter-section">
    <span class="filter-label">Team</span>
    <div class="pill-track" id="team-pills"></div>
    <div class="team-row-actions">
      <div class="dropdown-wrapper" id="team-dropdown-wrap">
        <button class="btn-team-dropdown" id="btn-team-dd">
          All Teams
          <svg viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1l4 4 4-4"/></svg>
        </button>
        <div class="team-dropdown-panel" id="team-dropdown-panel"></div>
      </div>
      <button class="btn-reset-pill" id="btn-reset">Reset</button>
    </div>
  </div>
  <div class="filter-section" style="border-bottom:none; padding-top:.6rem; padding-bottom:.7rem;">
    <span class="vtype-label">Type</span>
    <div class="vtype-list" id="vtype-list"></div>
  </div>
</div>

<main>
  <div class="results-meta" id="meta"></div>
  <div class="grid" id="grid"></div>
</main>

<footer>
  All links open directly on <a href="https://www.plus.fifa.com" target="_blank" rel="noopener">FIFA+</a>. A free FIFA+ account may be required.
</footer>

const VTYPES_BY_INDEX = ['full','highlights','full','extended','highlights','full','full','full','extended','full','full','highlights','full','full','extended','full','highlights','extended','full','highlights','extended','full','highlights','full','extended','highlights','full','full','full','full','extended','highlights','full','extended','highlights','full','extended','highlights'];
MATCHES.forEach((m, i) => { m.vtype = VTYPES_BY_INDEX[i] || 'full'; });


const VIDEO_TYPES = [
  { id: 'full',      label: 'Full Match Replays' },
  { id: 'extended',  label: 'Extended Highlights' },
  { id: 'highlights',label: 'Highlights' },
];

let activeYear   = null;
let activeTeam   = null;
let activeVTypes = new Set(['full', 'extended', 'highlights']);

const yearTrack    = document.getElementById('year-pills');
const teamTrack    = document.getElementById('team-pills');
const vtypeList    = document.getElementById('vtype-list');
const ddBtn        = document.getElementById('btn-team-dd');
const ddPanel      = document.getElementById('team-dropdown-panel');
const grid         = document.getElementById('grid');
const meta         = document.getElementById('meta');
const hdrCount     = document.getElementById('hdr-count');
const btnReset     = document.getElementById('btn-reset');

const allYears = [...new Set(MATCHES.map(m => m.y))].sort((a,b) => b-a);
const allTeams = [...new Set(MATCHES.flatMap(m => [m.t1, m.t2]))].sort();

allYears.forEach(y => {
  const p = document.createElement('button');
  p.className = 'pill'; p.textContent = y; p.dataset.val = y;
  p.addEventListener('click', () => { activeYear = activeYear === y ? null : y; refreshPills(); render(); });
  yearTrack.appendChild(p);
});

allTeams.forEach(t => {
  const p = document.createElement('button');
  p.className = 'pill'; p.textContent = t; p.dataset.val = t;
  p.addEventListener('click', () => { activeTeam = activeTeam === t ? null : t; refreshPills(); updateDdBtn(); render(); });
  teamTrack.appendChild(p);
});

const ddAllItem = document.createElement('button');
ddAllItem.className = 'dropdown-item active'; ddAllItem.textContent = 'All Teams';
ddAllItem.addEventListener('click', () => { activeTeam = null; refreshPills(); updateDdBtn(); closeDropdown(); render(); });
ddPanel.appendChild(ddAllItem);

allTeams.forEach(t => {
  const item = document.createElement('button');
  item.className = 'dropdown-item'; item.textContent = t; item.dataset.val = t;
  item.addEventListener('click', () => { activeTeam = t; refreshPills(); updateDdBtn(); closeDropdown(); render(); });
  ddPanel.appendChild(item);
});

function updateDdBtn() {
  ddBtn.querySelector('span') ? ddBtn.querySelector('span').textContent = activeTeam || 'All Teams'
    : ddBtn.childNodes[0].textContent = (activeTeam || 'All Teams') + ' ';
  ddPanel.querySelectorAll('.dropdown-item').forEach(el => {
    el.classList.toggle('active', (el.dataset.val || '') === (activeTeam || ''));
  });
}

function closeDropdown() { ddBtn.classList.remove('open'); ddPanel.classList.remove('open'); }

ddBtn.addEventListener('click', e => {
  e.stopPropagation();
  const open = ddPanel.classList.toggle('open');
  ddBtn.classList.toggle('open', open);
});
document.addEventListener('click', e => { if (!ddPanel.contains(e.target) && e.target !== ddBtn) closeDropdown(); });

VIDEO_TYPES.forEach(vt => {
  const count = MATCHES.filter(m => m.vtype === vt.id).length;
  const item = document.createElement('div');
  item.className = 'vtype-item checked'; item.dataset.id = vt.id;
  item.innerHTML = `<div class="vtype-check"><svg viewBox="0 0 10 8" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,4 3.5,6.5 9,1"/></svg></div><span class="vtype-text">${vt.label}</span><span class="vtype-count">(${count})</span>`;
  item.addEventListener('click', () => {
    if (activeVTypes.has(vt.id)) {
      if (activeVTypes.size === 1) return;
      activeVTypes.delete(vt.id);
      item.classList.remove('checked');
    } else {
      activeVTypes.add(vt.id);
      item.classList.add('checked');
    }
    render();
  });
  vtypeList.appendChild(item);
});

function refreshPills() {
  yearTrack.querySelectorAll('.pill').forEach(p => p.classList.toggle('active', String(activeYear) === p.dataset.val));
  teamTrack.querySelectorAll('.pill').forEach(p => {
    p.classList.toggle('active', activeTeam === p.dataset.val);
    p.classList.toggle('team', activeTeam === p.dataset.val);
  });
}

function filterMatches() {
  return MATCHES.filter(m => {
    if (activeYear && m.y !== activeYear) return false;
    if (activeTeam && ![m.t1, m.t2].includes(activeTeam)) return false;
    if (!activeVTypes.has(m.vtype)) return false;
    return true;
  });
}

const extIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;

const VTYPE_LABEL = { full: 'Full Match', extended: 'Extended', highlights: 'Highlights' };

function renderCard(m) {
  return `
    <article class="card">
      <div class="card-thumb">
        <span class="stage-badge">${m.stage}</span>
        <span class="year-badge">${m.y}</span>
        <div class="flags">
          ${flag(m.t1)}<span class="vs-badge">VS</span>${flag(m.t2)}
        </div>
      </div>
      <div class="card-body">
        <div class="match-title">${m.t1} vs ${m.t2}</div>
        <div class="match-meta">🏆 ${m.y} FIFA World Cup · <span style="color:var(--accent);opacity:.8">${VTYPE_LABEL[m.vtype]}</span></div>
        <div class="note">${m.note}</div>
        <div class="score-badge">FT: ${m.score}</div>
      </div>
      <div class="card-footer">
        <a class="watch-link" href="${m.url}" target="_blank" rel="noopener noreferrer">
          ${extIcon} Watch on FIFA+
        </a>
      </div>
    </article>`;
}

function render() {
  grid.innerHTML = `<div class="state-box"><div class="spinner"></div></div>`;
  meta.innerHTML = '';
  setTimeout(() => {
    const results = filterMatches();
    hdrCount.textContent = `${results.length} match${results.length !== 1 ? 'es' : ''}`;
    let desc = '';
    if (activeTeam) desc += `<strong>${activeTeam}</strong>`;
    if (activeYear) desc += (desc ? ' · ' : '') + `<strong>${activeYear}</strong>`;
    meta.innerHTML = `<span>${results.length} match${results.length !== 1 ? 'es' : ''} found${desc ? ' — ' + desc : ''}</span>
      <span>Links open on <a href="https://www.plus.fifa.com" target="_blank" rel="noopener">FIFA+</a></span>`;
    if (!results.length) {
      grid.innerHTML = `<div class="state-box"><div class="state-icon">🔍</div><h3>No matches found</h3>
        <p>Try adjusting your filters or <a href="https://www.plus.fifa.com/en/showcase/full-match-replays/cd5f0c31-fc6f-4502-aee3-633edf65ef60" target="_blank" rel="noopener" style="color:var(--accent)">browse the full FIFA+ archive</a>.</p></div>`;
      return;
    }
    grid.innerHTML = results.map(renderCard).join('');
  }, 180);
}

btnReset.addEventListener('click', () => {
  activeYear = null; activeTeam = null;
  activeVTypes = new Set(['full', 'extended', 'highlights']);
  vtypeList.querySelectorAll('.vtype-item').forEach(el => el.classList.add('checked'));
  refreshPills(); updateDdBtn(); render();
});

render();
</script>
